<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Padel League PH — Season 11 Matchups</title>
<style>
@import url('https://cdn.jsdelivr.net/npm/@fontsource/barlow-condensed@5/700-italic.css');
@import url('https://cdn.jsdelivr.net/npm/@fontsource/inter@5/400.css');
@import url('https://cdn.jsdelivr.net/npm/@fontsource/inter@5/600.css');
@import url('https://cdn.jsdelivr.net/npm/@fontsource/jetbrains-mono@5/400.css');

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #0E1523;
  color: #ffffff;
  font-family: 'Inter', Arial, sans-serif;
  min-height: 100vh;
  padding: 0;
}

.page {
  max-width: 720px;
  margin: 0 auto;
  padding: 28px 20px 40px;
}

.plh { font-family: 'Barlow Condensed','Arial Narrow',Arial,sans-serif; font-style:italic; font-weight:700; }
.plm { font-family: 'JetBrains Mono','Courier New',monospace; }
.teal { color: #00C8DC; }
.slate { color: #687FA3; }

/* HEADER */
.header {
  display: flex;
  align-items: center;
  gap: 12px;
  padding-bottom: 20px;
  border-bottom: 1px solid #1E3050;
  margin-bottom: 24px;
}
.logo-box {
  width: 36px; height: 36px; background: #00C8DC; border-radius: 7px;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.header-right {
  margin-left: auto; text-align: right;
}

/* SEARCH */
.search-wrap {
  margin-bottom: 18px;
  position: relative;
}
.search-input {
  width: 100%;
  background: #162032;
  border: 1px solid #1E3050;
  color: #fff;
  font-family: 'Inter', Arial, sans-serif;
  font-size: 14px;
  padding: 14px 16px 14px 44px;
  border-radius: 8px;
  outline: none;
  transition: border-color 0.15s;
}
.search-input:focus {
  border-color: #00C8DC;
}
.search-input::placeholder { color: #687FA3; }
.search-icon {
  position: absolute;
  left: 14px;
  top: 50%;
  transform: translateY(-50%);
  color: #687FA3;
  pointer-events: none;
}
.suggestions {
  position: absolute;
  top: calc(100% + 4px);
  left: 0;
  right: 0;
  background: #162032;
  border: 1px solid #1E3050;
  border-radius: 8px;
  max-height: 260px;
  overflow-y: auto;
  z-index: 10;
  display: none;
}
.suggestions.open { display: block; }
.suggestion {
  padding: 10px 14px;
  cursor: pointer;
  font-size: 13px;
  border-bottom: 1px solid rgba(30,48,80,0.5);
}
.suggestion:last-child { border-bottom: none; }
.suggestion:hover, .suggestion.active {
  background: rgba(0,200,220,0.08);
  color: #00C8DC;
}
.suggestion-count {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: #687FA3;
  float: right;
}

/* PLAYER PILLS */
.player-pills {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 22px;
}
.player-pill {
  background: #162032;
  border: 1px solid #1E3050;
  color: rgba(255,255,255,0.85);
  border-radius: 999px;
  padding: 5px 11px;
  font-size: 11px;
  cursor: pointer;
  transition: all 0.12s;
  font-family: 'Inter', Arial, sans-serif;
}
.player-pill:hover {
  border-color: #00C8DC;
  color: #00C8DC;
}
.player-pill.selected {
  background: #00C8DC;
  color: #0E1523;
  border-color: #00C8DC;
  font-weight: 600;
}

/* SUMMARY */
.summary {
  background: #162032;
  border: 1px solid #1E3050;
  border-radius: 8px;
  padding: 16px 18px;
  margin-bottom: 18px;
  display: none;
}
.summary.show { display: block; }
.summary-name {
  font-size: 22px;
  margin-bottom: 6px;
}
.summary-meta {
  font-size: 11px;
  color: #687FA3;
  letter-spacing: 1px;
  text-transform: uppercase;
}
.summary-stats {
  display: flex;
  gap: 18px;
  margin-top: 12px;
}
.summary-stat {
  font-size: 11px;
  color: #687FA3;
}
.summary-stat strong {
  display: block;
  font-family: 'JetBrains Mono', monospace;
  color: #00C8DC;
  font-size: 18px;
  font-weight: 700;
}

/* SECTION */
.bracket-section {
  margin-bottom: 28px;
}
.bracket-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 12px;
  padding-bottom: 8px;
  border-bottom: 1px solid rgba(0,200,220,0.15);
}
.bracket-title {
  font-size: 18px;
  line-height: 1;
}
.bracket-badge {
  font-size: 9px;
  letter-spacing: 1px;
  background: rgba(0,200,220,0.1);
  color: #00C8DC;
  border: 1px solid rgba(0,200,220,0.25);
  border-radius: 3px;
  padding: 2px 7px;
  font-family: 'JetBrains Mono', monospace;
  margin-left: auto;
}

/* MATCH ROW */
.match-row {
  display: flex;
  align-items: center;
  padding: 11px 14px;
  margin-bottom: 5px;
  background: #162032;
  border-radius: 6px;
  border: 1px solid #1E3050;
  flex-wrap: wrap;
  gap: 4px;
}
.match-row.is-mine {
  border-color: rgba(0,200,220,0.5);
  background: rgba(0,200,220,0.05);
}
.match-num {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: #00C8DC;
  min-width: 32px;
  flex-shrink: 0;
}
.match-team-tag {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  color: #687FA3;
  min-width: 50px;
  flex-shrink: 0;
}
.match-pair {
  font-size: 13px;
  color: rgba(255,255,255,0.85);
  flex: 1;
  line-height: 1.4;
  min-width: 0;
}
.match-vs {
  font-size: 10px;
  color: #687FA3;
  margin: 0 8px;
  flex-shrink: 0;
  font-weight: 600;
}
.match-pair-right {
  font-size: 13px;
  color: rgba(255,255,255,0.85);
  flex: 1;
  text-align: right;
  line-height: 1.4;
  min-width: 0;
}
.player-hl {
  color: #00C8DC;
  font-weight: 600;
}

.empty-state {
  text-align: center;
  color: #687FA3;
  padding: 40px 20px;
  font-size: 13px;
}

.no-results {
  text-align: center;
  color: #687FA3;
  padding: 32px 20px;
  font-size: 12px;
  background: #162032;
  border: 1px dashed #1E3050;
  border-radius: 8px;
}

/* FOOTER */
.footer {
  margin-top: 32px;
  padding-top: 16px;
  border-top: 1px solid #1E3050;
  text-align: center;
}
.footer-text {
  font-size: 9px;
  letter-spacing: 1.5px;
  color: #687FA3;
}

@media (max-width: 480px) {
  .page { padding: 20px 14px 32px; }
  .match-pair, .match-pair-right { font-size: 12px; }
  .summary-name { font-size: 18px; }
}
</style>

ile": "11d.html", "num": "24", "teamLeft": "Team 3", "teamRight": "Team 4", "pairLeft": "PJ & Phee", "pairRight": "Jon & Nikko", "playersLeft": ["PJ", "Phee"], "playersRight": ["Jon", "Nikko"], "allPlayers": ["PJ", "Phee", "Jon", "Nikko"]}];
const PLAYERS = ["Alan", "Alexis", "Alfonso", "Amaury", "Andy", "Angel", "Armand", "Austin", "BJ", "Chut", "Erwin", "Fred", "George", "Gil", "Hein", "Henrik", "Ian", "Jerry", "JF", "JM", "Joe", "Joel", "John", "Jolo", "Jon", "Jopet", "Josh", "Karlo", "Kevin", "Kino", "Kres", "Leandro", "Luca", "Miggy", "Misagh", "Nicholai", "Nigel", "Nikko", "Norifumi", "Pancho", "Pedro", "Petar", "Phee", "PJ", "Rave", "Robin", "Ron", "Shogo", "Ted", "Tiger", "Vic"];

const search = document.getElementById('search');
const suggestionsEl = document.getElementById('suggestions');
const pillsEl = document.getElementById('playerPills');
const resultsEl = document.getElementById('results');
const summaryEl = document.getElementById('summary');
const summaryNameEl = document.getElementById('summaryName');
const summaryMetaEl = document.getElementById('summaryMeta');
const summaryStatsEl = document.getElementById('summaryStats');
const totalEl = document.getElementById('totalMatches');

totalEl.textContent = MATCHES.length;

let selectedPlayer = null;

// Build matches-per-player count
const playerMatchCount = {};
PLAYERS.forEach(p => playerMatchCount[p] = 0);
MATCHES.forEach(m => m.allPlayers.forEach(p => { playerMatchCount[p] = (playerMatchCount[p] || 0) + 1; }));

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function highlight(pair, player) {
  if (!player) return escapeHtml(pair);
  return escapeHtml(pair).replace(
    new RegExp('\\b' + player.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + '\\b', 'g'),
    '<span class="player-hl">' + escapeHtml(player) + '</span>'
  );
}

function renderPills() {
  pillsEl.innerHTML = PLAYERS.map(p =>
    `<button class="player-pill${selectedPlayer === p ? ' selected' : ''}" data-player="${escapeHtml(p)}">${escapeHtml(p)}</button>`
  ).join('');
}

function renderResults() {
  let list = MATCHES;
  if (selectedPlayer) {
    list = MATCHES.filter(m => m.allPlayers.includes(selectedPlayer));
  }

  if (list.length === 0) {
    resultsEl.innerHTML = '<div class="no-results">No matches found.</div>';
    return;
  }

  // Group by bracket
  const byBracket = {};
  list.forEach(m => {
    if (!byBracket[m.bracket]) byBracket[m.bracket] = [];
    byBracket[m.bracket].push(m);
  });

  resultsEl.innerHTML = Object.keys(byBracket).sort().map(bracket => {
    const items = byBracket[bracket];
    const rows = items.map(m => {
      const isMine = selectedPlayer && m.allPlayers.includes(selectedPlayer);
      return `
        <div class="match-row${isMine ? ' is-mine' : ''}">
          <div class="match-num">${escapeHtml(m.num)}</div>
          <div class="match-pair">${highlight(m.pairLeft, selectedPlayer)}</div>
          <div class="match-vs">VS</div>
          <div class="match-pair-right">${highlight(m.pairRight, selectedPlayer)}</div>
        </div>
      `;
    }).join('');
    return `
      <div class="bracket-section">
        <div class="bracket-header">
          <div class="plh bracket-title">${escapeHtml(bracket)}</div>
          <div class="bracket-badge">${items.length} ${items.length === 1 ? 'MATCH' : 'MATCHES'}</div>
        </div>
        ${rows}
      </div>
    `;
  }).join('');
}

function renderSummary() {
  if (!selectedPlayer) {
    summaryEl.classList.remove('show');
    return;
  }
  const playerMatches = MATCHES.filter(m => m.allPlayers.includes(selectedPlayer));
  const partners = new Set();
  const opponents = new Set();
  const brackets = new Set();
  playerMatches.forEach(m => {
    brackets.add(m.bracket);
    const onLeft = m.playersLeft.includes(selectedPlayer);
    const myPair = onLeft ? m.playersLeft : m.playersRight;
    const oppPair = onLeft ? m.playersRight : m.playersLeft;
    myPair.forEach(p => { if (p !== selectedPlayer) partners.add(p); });
    oppPair.forEach(p => opponents.add(p));
  });

  summaryEl.classList.add('show');
  summaryNameEl.textContent = selectedPlayer;
  summaryMetaEl.textContent = `${[...brackets].sort().join(', ')} · Season 11`;
  summaryStatsEl.innerHTML = `
    <div class="summary-stat"><strong>${playerMatches.length}</strong>Matches</div>
    <div class="summary-stat"><strong>${partners.size}</strong>Partners</div>
    <div class="summary-stat"><strong>${opponents.size}</strong>Opponents</div>
  `;
}

function selectPlayer(name) {
  selectedPlayer = name;
  search.value = name || '';
  suggestionsEl.classList.remove('open');
  renderPills();
  renderSummary();
  renderResults();
  if (name) {
    // Scroll to summary on mobile
    setTimeout(() => summaryEl.scrollIntoView({behavior:'smooth', block:'start'}), 50);
  }
}

function renderSuggestions(query) {
  const q = query.trim().toLowerCase();
  if (!q) {
    suggestionsEl.classList.remove('open');
    return;
  }
  const matches = PLAYERS.filter(p => p.toLowerCase().includes(q)).slice(0, 12);
  if (matches.length === 0) {
    suggestionsEl.innerHTML = '<div class="suggestion" style="cursor:default;color:#687FA3">No player found</div>';
    suggestionsEl.classList.add('open');
    return;
  }
  suggestionsEl.innerHTML = matches.map(p =>
    `<div class="suggestion" data-player="${escapeHtml(p)}">${escapeHtml(p)}<span class="suggestion-count">${playerMatchCount[p]} matches</span></div>`
  ).join('');
  suggestionsEl.classList.add('open');
}

// Events
search.addEventListener('input', e => {
  if (selectedPlayer && e.target.value !== selectedPlayer) {
    selectedPlayer = null;
    renderPills();
    renderSummary();
    renderResults();
  }
  renderSuggestions(e.target.value);
});

search.addEventListener('focus', () => {
  if (search.value.trim()) renderSuggestions(search.value);
});

document.addEventListener('click', e => {
  if (!suggestionsEl.contains(e.target) && e.target !== search) {
    suggestionsEl.classList.remove('open');
  }
});

suggestionsEl.addEventListener('click', e => {
  const target = e.target.closest('.suggestion');
  if (target && target.dataset.player) selectPlayer(target.dataset.player);
});

pillsEl.addEventListener('click', e => {
  const target = e.target.closest('.player-pill');
  if (!target) return;
  const name = target.dataset.player;
  selectPlayer(selectedPlayer === name ? null : name);
});

search.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    const q = search.value.trim().toLowerCase();
    const exact = PLAYERS.find(p => p.toLowerCase() === q);
    const first = PLAYERS.find(p => p.toLowerCase().includes(q));
    if (exact) selectPlayer(exact);
    else if (first) selectPlayer(first);
  }
  if (e.key === 'Escape') {
    selectPlayer(null);
  }
});

// Init
renderPills();
renderResults();
</script>
